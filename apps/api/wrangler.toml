name = "dishy-api"
main = "build/worker/shim.mjs"
compatibility_date = "2024-09-23"

[build]
command = "cargo install worker-build && worker-build --release"

[vars]
AXIOM_DATASET = "dishy-api"
CLERK_JWKS_URL = "https://api.clerk.com/v1/jwks"
CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"

# AXIOM_API_TOKEN is a secret — set via:
#   npx wrangler secret put AXIOM_API_TOKEN

# CLERK_SECRET_KEY is a secret — set via:
#   npx wrangler secret put CLERK_SECRET_KEY

# ANTHROPIC_API_KEY is a secret — set via:
#   npx wrangler secret put ANTHROPIC_API_KEY

# FDC_API_KEY (USDA FoodData Central) is a secret — set via:
#   npx wrangler secret put FDC_API_KEY
# Get a free key from https://api.data.gov/signup/

# D1 Database — create with:
#   npx wrangler d1 create dishy-db
# Then replace the database_id below with the real ID.
# Apply migrations with:
#   npx wrangler d1 migrations apply DB --local   (local dev)
#   npx wrangler d1 migrations apply DB --remote  (production)
[[d1_databases]]
binding = "DB"
database_name = "dishy-db"
database_id = "placeholder-replace-after-d1-create"
migrations_dir = "src/db/migrations"

# R2 Bucket for image storage (covers, capture artifacts)
# Create with:
#   npx wrangler r2 bucket create dishy-images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "dishy-images"
