name: dishy
description: "Recipe Capture & Cooking App — capture messy food content into structured, beautiful recipes."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  clerk_flutter: ^0.0.14-beta
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  mockito: ^5.4.6

flutter:
  uses-material-design: true
